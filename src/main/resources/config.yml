# Core Economics Settings
settings:
      commission_percent: 10.0        # Commission fee (in %)
      economy-mode: "VAULT"
      item-resource: "DIAMOND"
      custom-currency-name: ""        # Custom currency name override (leave empty for auto-detection)

# Economy mode specific limits
economy:
      vault:
            min_exchange: 100               # Minimum amount for exchange (Vault)
            min_bet: 1000                   # Minimum bet (Vault)
            max_bet: 10000                  # Maximum bet (Vault)
      item:
            min_exchange: 10                # Minimum amount for exchange (Items)
            min_bet: 10                     # Minimum bet (Items)
            max_bet: 1000                   # Maximum bet (Items)

# Language Setting (e.g., en, ru)
lang: en

# Update Checker
check-for-updates: true   # Set to false to disable update notifications

# Roulette Settings
roulette:
      enabled: true                   # Enable or disable Roulette game
      timer_duration: 30              # Countdown time before spin (seconds)
      payouts:
            number: 36                    # Multiplier for exact number match
            zero: 36                      # Multiplier for Zero (0)
            color: 2                      # Multiplier for Red/Black
            sector: 3                     # Multiplier for Dozens (1st12, 2nd12, 3rd12)

# Crash Game Settings
crash:
      enabled: true                   # Enable or disable Crash game
      start_multiplier: 0.10          # Initial multiplier
      tick_speed: 2                   # Update speed (every X ticks)
      increment: 0.01                 # Value added to multiplier per tick
      generation:
            instant_crash_chance: 0.30    # 30% chance to crash at 1.00x
            low_crash_chance: 0.60        # Chance to crash between 0.5x and 1.1x

# Slot Machine Weights & Custom Payout Multipliers
slots:
      enabled: true                   # Enable or disable Slot Machine game
      weights:
            COAL: 40                  # Very common (40%) - harder to win
            IRON_INGOT: 25            # Common (25%)
            REDSTONE: 20             # Common (20%)
            LAPIS_LAZULI: 15         # Uncommon (15%)
            QUARTZ: 12               # Uncommon (12%
            GOLD_INGOT: 5            # Rare (5%) - harder to win
            EMERALD: 3               # Very rare (3%) - harder to win
            DIAMOND: 2              # Extremely rare (2%) - harder to win
            NETHERITE_INGOT: 1       # Legendary (1%), very rare
      multipliers:
            NETHERITE_INGOT: 500     # Huge payout for legendary symbol
            DIAMOND: 50              # Big win
            EMERALD: 30              # Good win
            GOLD_INGOT: 15           # Decent win
            DEFAULT: 5               # Base multiplier for other symbols

# Roulette simultaneous betting positions limits by Vault Groups or Permission Nodes
# Supports custom groups from LuckPerms, PermissionsEx, or any other permission plugin
# Format: "permission_node_or_group: limit"
# Example: If player has permission "casino.limit.vip" or is in "vip" group, they get 10 selections
selection_limits:
      default: 5          # Default limit for all players
      vip: 10             # For players with "casino.limit.vip" permission or in "vip" group
      admin: 25           # For players with "casino.limit.admin" permission or in "admin" group
      # Custom examples (uncomment and modify as needed):
      # premium: 15        # For players with "casino.limit.premium" permission
      # donor: 12           # For players with "casino.limit.donor" permission
      # legendary: 20       # For players with "casino.limit.legendary" permission
