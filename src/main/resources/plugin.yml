name: CasinoRoulette
version: '1.2.0'
main: ru.stepanyaa.casinoRoulette.CasinoRoulette
api-version: 1.16
softdepend: [Vault]

commands:
  casino:
    description: Main casino menu
    usage: /casino [reload]

permissions:
  casino.reload:
    description: Reload plugin configuration
    default: op

  # VIP / Limit permissions
  casino.limit.vip:
    description: Increased betting position limit (10)
    default: false

  casino.limit.admin:
    description: Maximum betting position limit (25)
    default: false

  # Update notifications
  casino.update.notify:
    description: Receive update notifications
    default: op

  # Admin permissions
  casino.admin:
    description: Full administrative access
    default: op
    children:
      casino.reload: true
      casino.update.notify: true
      casino.limit.admin: true